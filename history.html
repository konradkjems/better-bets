<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Better Bets - Historik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./src/style.css">
    <link rel="icon" type="image/svg+xml" href="./src/assets/Better Bets Icon.svg">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="./" class="flex items-center gap-2">
                    <img src="./src/assets/Better Bets Icon.svg" alt="Better Bets Logo" class="h-8 w-8">
                    <span class="text-xl font-bold text-gray-800">Better Bets</span>
                </a>
                <div class="flex items-center gap-4">
                    <span id="userEmail" class="text-gray-600"></span>
                    <button id="logoutButton" class="btn-secondary">Log ud</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Sub-navigation -->
    <div class="bg-white border-b">
        <div class="container mx-auto px-4">
            <div class="flex space-x-8">
                <a href="/" class="px-3 py-4 text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-b-2 hover:border-gray-700">
                    Forside
                </a>
                <a href="/calculator.html" class="px-3 py-4 text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-b-2 hover:border-gray-700">
                    Lommeregner
                </a>
                <a href="/history.html" class="px-3 py-4 text-sm font-medium text-gray-900 border-b-2 border-blue-500">
                    Historik
                </a>
                <a href="/settings.html" class="px-3 py-4 text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-b-2 hover:border-gray-700">
                    Indstillinger
                </a>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Beregningshistorik</h1>
            <p class="text-gray-600">Se dine tidligere arbitrage beregninger og resultater</p>
        </header>

        <!-- Filtrering og søgning -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Periode</label>
                    <select class="input-field w-full">
                        <option value="7">Seneste 7 dage</option>
                        <option value="30">Seneste 30 dage</option>
                        <option value="90">Seneste 3 måneder</option>
                        <option value="all">Hele historikken</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Minimum profit</label>
                    <input type="number" class="input-field w-full" placeholder="F.eks. 100 DKK">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Søg</label>
                    <input type="text" class="input-field w-full" placeholder="Søg på hold eller bookmaker...">
                </div>
            </div>
        </div>

        <!-- Historik tabel -->
        <div class="bg-white rounded-xl shadow-sm p-6">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-gray-200">
                            <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">Dato</th>
                            <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">Kamp</th>
                            <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">Bookmakere</th>
                            <th class="px-4 py-3 text-right text-sm font-semibold text-gray-700">Total indsats</th>
                            <th class="px-4 py-3 text-right text-sm font-semibold text-gray-700">Profit</th>
                            <th class="px-4 py-3 text-right text-sm font-semibold text-gray-700">ROI</th>
                            <th class="px-4 py-3 text-center text-sm font-semibold text-gray-700">Handlinger</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        <!-- Eksempel rækker -->
                        <tr class="hover:bg-gray-50">
                            <td class="px-4 py-3 text-sm text-gray-900">24. feb 2024</td>
                            <td class="px-4 py-3">
                                <div class="text-sm font-medium text-gray-900">FCK vs. Brøndby</div>
                                <div class="text-xs text-gray-500">Superliga</div>
                            </td>
                            <td class="px-4 py-3">
                                <div class="flex -space-x-2">
                                    <div class="w-6 h-6 rounded-full bg-blue-100 flex items-center justify-center text-xs font-medium">U</div>
                                    <div class="w-6 h-6 rounded-full bg-green-100 flex items-center justify-center text-xs font-medium">B</div>
                                    <div class="w-6 h-6 rounded-full bg-purple-100 flex items-center justify-center text-xs font-medium">N</div>
                                </div>
                            </td>
                            <td class="px-4 py-3 text-right text-sm text-gray-900">4.500 DKK</td>
                            <td class="px-4 py-3 text-right">
                                <span class="text-sm font-medium text-green-600">+225 DKK</span>
                            </td>
                            <td class="px-4 py-3 text-right">
                                <span class="text-sm font-medium text-green-600">5%</span>
                            </td>
                            <td class="px-4 py-3 text-center">
                                <button class="text-blue-600 hover:text-blue-800">
                                    <span class="sr-only">Se detaljer</span>
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                    </svg>
                                </button>
                            </td>
                        </tr>
                        <!-- Flere eksempel rækker her... -->
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="flex items-center justify-between mt-6">
                <div class="text-sm text-gray-700">
                    Viser <span class="font-medium">1</span> til <span class="font-medium">10</span> af <span class="font-medium">23</span> resultater
                </div>
                <div class="flex gap-2">
                    <button class="btn-secondary px-3 py-2 text-sm disabled:opacity-50" disabled>
                        Forrige
                    </button>
                    <button class="btn-secondary px-3 py-2 text-sm">
                        Næste
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
